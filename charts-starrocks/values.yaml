iceberg:
  restCatalog:
    # URI of the Iceberg REST catalog deployed by charts-iceberg.
    # Default assumes both charts are in the same namespace.
    uri: "http://iceberg-rest-catalog:8181"

starrocks:
  fe:
    image: "starrocks/fe-ubuntu:4.0.8"
    replicas: 1
    storageSize: 10Gi
    storageClass: aws-ebs-csi
    s3:
      bucket: ""
      region: us-west-2
      path: ""
      useInstanceProfile: true
    resources:
      requests:
        cpu: "2"
        memory: 6Gi
      limits:
        cpu: "2"
        memory: 6Gi

  cn:
    image: "starrocks/cn-ubuntu:4.0.8"
    replicas: 1
    cacheSizeLimit: 10Gi
    resources:
      requests:
        cpu: "2"
        memory: 8Gi
      limits:
        cpu: "2"
        memory: 8Gi
    hpa:
      enabled: false
      minReplicas: 1
      maxReplicas: 3
      targetCPUUtilizationPercentage: 70
