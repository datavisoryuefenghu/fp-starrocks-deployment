apiVersion: batch/v1
kind: Job
metadata:
  name: starrocks-init
  labels:
    app.kubernetes.io/name: starrocks-fe
    {{- include "chart.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-fe
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for StarRocks FE..."
              until nc -z starrocks-fe 9030; do sleep 5; done
              echo "FE ready."
              sleep 15
      containers:
        - name: init-sql
          image: mysql:8.0
          command:
            - bash
            - -c
            - |
              set -euo pipefail
              HOST="starrocks-fe"
              PORT=9030

              echo "=== Registering CN ==="
              mysql -h "$HOST" -P "$PORT" -u root --ssl-mode=DISABLED -e "
                ALTER SYSTEM ADD COMPUTE NODE 'starrocks-cn:9050';
              " 2>&1 || echo "CN may already be registered"

              echo "=== Verifying CN ==="
              mysql -h "$HOST" -P "$PORT" -u root --ssl-mode=DISABLED -e "SHOW COMPUTE NODES;"

              echo "=== Creating Iceberg catalog ==="
              mysql -h "$HOST" -P "$PORT" -u root --ssl-mode=DISABLED -e "
                CREATE EXTERNAL CATALOG IF NOT EXISTS iceberg_catalog
                PROPERTIES (
                  'type' = 'iceberg',
                  'iceberg.catalog.type' = 'rest',
                  'iceberg.catalog.uri' = '{{ .Values.iceberg.restCatalog.uri }}',
                  'aws.s3.region' = '{{ .Values.starrocks.fe.s3.region }}',
                  'aws.s3.use_instance_profile' = '{{ .Values.starrocks.fe.s3.useInstanceProfile }}'
                );
              "

              echo "=== Verifying catalogs ==="
              mysql -h "$HOST" -P "$PORT" -u root --ssl-mode=DISABLED -e "SHOW CATALOGS;"
              echo "=== Init complete ==="
