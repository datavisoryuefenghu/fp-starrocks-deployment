iceberg:
  restCatalog:
    # URI of the Iceberg REST catalog deployed by charts-iceberg.
    # Default assumes both charts are in the same namespace.
    uri: "http://iceberg-rest-catalog:8181"

starrocks:
  fe:
    image: "starrocks/fe-ubuntu:3.3-latest"
    replicas: 1
    storageSize: 10Gi
    storageClass: aws-ebs-csi
    s3:
      bucket: ""
      region: us-west-2
      path: ""
      useInstanceProfile: true
    resources:
      requests:
        cpu: "1"
        memory: 4Gi
      limits:
        cpu: "2"
        memory: 8Gi

  cn:
    image: "starrocks/cn-ubuntu:3.3-latest"
    replicas: 1
    cacheSizeLimit: 10Gi
    resources:
      requests:
        cpu: "1"
        memory: 4Gi
      limits:
        cpu: "2"
        memory: 8Gi
