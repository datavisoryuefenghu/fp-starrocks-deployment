airflow:
  image: "apache/airflow:3.2.0-python3.11"
  executor: KubernetesExecutor

  # Fernet key for encrypting connections.
  # Override per environment via existingFernetSecret.
  fernetKey: ""
  existingFernetSecret: ""

  webserver:
    replicas: 1
    service:
      type: ClusterIP
      port: 8080
      nodePort: ""
    resources:
      requests:
        cpu: "500m"
        memory: 1Gi
      limits:
        cpu: "1"
        memory: 2Gi
    adminUser: admin
    adminEmail: airflow@datavisor.com
    adminPassword: ""
    existingAdminSecret: ""

  scheduler:
    replicas: 1
    resources:
      requests:
        cpu: "500m"
        memory: 1Gi
      limits:
        cpu: "1"
        memory: 2Gi

  workerPod:
    resources:
      requests:
        cpu: "250m"
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 2Gi

  dags:
    gitSync:
      enabled: false
      repo: ""
      branch: main
      subPath: dags
      image: "registry.k8s.io/git-sync/git-sync:v4.2.4"
      interval: 60
      existingSSHSecret: ""

postgresql:
  image: "postgres:16-alpine"
  storageSize: 5Gi
  storageClass: aws-ebs-csi
  database: airflow
  username: airflow
  password: "airflow"
  existingSecret: ""
  resources:
    requests:
      cpu: "250m"
      memory: 512Mi
    limits:
      cpu: "500m"
      memory: 1Gi
