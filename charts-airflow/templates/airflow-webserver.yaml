apiVersion: v1
kind: Service
metadata:
  name: airflow-webserver
  labels:
    app.kubernetes.io/name: airflow-webserver
    {{- include "chart.labels" . | nindent 4 }}
spec:
  type: {{ .Values.airflow.webserver.service.type }}
  ports:
    - name: http
      port: {{ .Values.airflow.webserver.service.port }}
      targetPort: 8080
      {{- if and (eq .Values.airflow.webserver.service.type "NodePort") .Values.airflow.webserver.service.nodePort }}
      nodePort: {{ .Values.airflow.webserver.service.nodePort }}
      {{- end }}
  selector:
    app.kubernetes.io/name: airflow-webserver
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-webserver
  labels:
    app.kubernetes.io/name: airflow-webserver
    {{- include "chart.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.airflow.webserver.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: airflow-webserver
  template:
    metadata:
      labels:
        app.kubernetes.io/name: airflow-webserver
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
    spec:
      serviceAccountName: airflow
      initContainers:
        - name: wait-for-db-init
          image: {{ .Values.airflow.image }}
          command:
            - bash
            - -c
            - |
              echo "Waiting for Airflow DB schema..."
              until airflow db check-migrations 2>/dev/null; do
                echo "DB not ready yet, retrying..."
                sleep 5
              done
              echo "DB ready."
          env:
            - name: POSTGRES_PASSWORD
              {{- if .Values.postgresql.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgresql.existingSecret }}
                  key: postgres-password
              {{- else }}
              value: {{ .Values.postgresql.password | quote }}
              {{- end }}
            - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
              value: "postgresql+psycopg2://{{ .Values.postgresql.username }}:$(POSTGRES_PASSWORD)@airflow-db:5432/{{ .Values.postgresql.database }}"
        - name: seed-passwords
          image: busybox:1.36
          command: ["sh", "-c", "cp /auth-seed/passwords.json /auth/passwords.json && chmod 666 /auth/passwords.json"]
          volumeMounts:
            - name: auth-seed
              mountPath: /auth-seed
              readOnly: true
            - name: auth
              mountPath: /auth
      containers:
        - name: webserver
          image: {{ .Values.airflow.image }}
          command: ["airflow", "api-server"]
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: POSTGRES_PASSWORD
              {{- if .Values.postgresql.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgresql.existingSecret }}
                  key: postgres-password
              {{- else }}
              value: {{ .Values.postgresql.password | quote }}
              {{- end }}
            - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
              value: "postgresql+psycopg2://{{ .Values.postgresql.username }}:$(POSTGRES_PASSWORD)@airflow-db:5432/{{ .Values.postgresql.database }}"
            - name: AIRFLOW__CORE__EXECUTOR
              value: {{ .Values.airflow.executor | quote }}
            - name: AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS
              value: "{{ .Values.airflow.webserver.adminUser }}:Admin"
            - name: AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_PASSWORDS_FILE
              value: "/opt/airflow/auth/passwords.json"
            {{- if .Values.airflow.existingFernetSecret }}
            - name: AIRFLOW__CORE__FERNET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.airflow.existingFernetSecret }}
                  key: fernet-key
            {{- else if .Values.airflow.fernetKey }}
            - name: AIRFLOW__CORE__FERNET_KEY
              value: {{ .Values.airflow.fernetKey | quote }}
            {{- end }}
          envFrom:
            - configMapRef:
                name: airflow-env
          readinessProbe:
            httpGet:
              path: /public/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /public/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 5
          resources:
            {{- toYaml .Values.airflow.webserver.resources | nindent 12 }}
          volumeMounts:
            - name: dags
              mountPath: /opt/airflow/dags
            - name: auth
              mountPath: /opt/airflow/auth
      {{- if .Values.airflow.dags.gitSync.enabled }}
        - name: git-sync
          image: {{ .Values.airflow.dags.gitSync.image }}
          env:
            - name: GITSYNC_REPO
              value: {{ .Values.airflow.dags.gitSync.repo | quote }}
            - name: GITSYNC_BRANCH
              value: {{ .Values.airflow.dags.gitSync.branch | quote }}
            - name: GITSYNC_ROOT
              value: "/git"
            - name: GITSYNC_DEST
              value: "dags"
            - name: GITSYNC_PERIOD
              value: {{ .Values.airflow.dags.gitSync.interval | quote }}
            {{- if .Values.airflow.dags.gitSync.existingSSHSecret }}
            - name: GITSYNC_SSH
              value: "true"
            - name: GITSYNC_SSH_KEY_FILE
              value: "/etc/git-secret/ssh-key"
            {{- end }}
          volumeMounts:
            - name: dags
              mountPath: /git
            {{- if .Values.airflow.dags.gitSync.existingSSHSecret }}
            - name: git-ssh
              mountPath: /etc/git-secret
              readOnly: true
            {{- end }}
      {{- end }}
      volumes:
        - name: dags
          emptyDir: {}
        - name: auth
          emptyDir: {}
        - name: auth-seed
          configMap:
            name: airflow-auth
        {{- if and .Values.airflow.dags.gitSync.enabled .Values.airflow.dags.gitSync.existingSSHSecret }}
        - name: git-ssh
          secret:
            secretName: {{ .Values.airflow.dags.gitSync.existingSSHSecret }}
            defaultMode: 0400
        {{- end }}
