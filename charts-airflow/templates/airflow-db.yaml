apiVersion: v1
kind: Service
metadata:
  name: airflow-db
  labels:
    app.kubernetes.io/name: airflow-db
    {{- include "chart.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
  selector:
    app.kubernetes.io/name: airflow-db
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: airflow-db
  labels:
    app.kubernetes.io/name: airflow-db
    {{- include "chart.labels" . | nindent 4 }}
spec:
  serviceName: airflow-db
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: airflow-db
  template:
    metadata:
      labels:
        app.kubernetes.io/name: airflow-db
    spec:
      containers:
        - name: postgres
          image: {{ .Values.postgresql.image }}
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_DB
              value: {{ .Values.postgresql.database | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.postgresql.username | quote }}
            - name: POSTGRES_PASSWORD
              {{- if .Values.postgresql.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgresql.existingSecret }}
                  key: postgres-password
              {{- else }}
              value: {{ .Values.postgresql.password | quote }}
              {{- end }}
            - name: PGDATA
              value: "/var/lib/postgresql/data/pgdata"
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.postgresql.username | quote }}]
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.postgresql.username | quote }}]
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 5
          resources:
            {{- toYaml .Values.postgresql.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: {{ .Values.postgresql.storageClass }}
        resources:
          requests:
            storage: {{ .Values.postgresql.storageSize }}
