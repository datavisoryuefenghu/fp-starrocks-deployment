apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-scheduler
  labels:
    app.kubernetes.io/name: airflow-scheduler
    {{- include "chart.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.airflow.scheduler.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: airflow-scheduler
  template:
    metadata:
      labels:
        app.kubernetes.io/name: airflow-scheduler
    spec:
      serviceAccountName: airflow
      initContainers:
        - name: wait-for-db-init
          image: {{ .Values.airflow.image }}
          command:
            - bash
            - -c
            - |
              echo "Waiting for Airflow DB schema..."
              until airflow db check-migrations 2>/dev/null; do
                echo "DB not ready yet, retrying..."
                sleep 5
              done
              echo "DB ready."
          env:
            - name: POSTGRES_PASSWORD
              {{- if .Values.postgresql.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgresql.existingSecret }}
                  key: postgres-password
              {{- else }}
              value: {{ .Values.postgresql.password | quote }}
              {{- end }}
            - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
              value: "postgresql+psycopg2://{{ .Values.postgresql.username }}:$(POSTGRES_PASSWORD)@airflow-db:5432/{{ .Values.postgresql.database }}"
      containers:
        - name: scheduler
          image: {{ .Values.airflow.image }}
          command: ["airflow", "scheduler"]
          env:
            - name: POSTGRES_PASSWORD
              {{- if .Values.postgresql.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgresql.existingSecret }}
                  key: postgres-password
              {{- else }}
              value: {{ .Values.postgresql.password | quote }}
              {{- end }}
            - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
              value: "postgresql+psycopg2://{{ .Values.postgresql.username }}:$(POSTGRES_PASSWORD)@airflow-db:5432/{{ .Values.postgresql.database }}"
            - name: AIRFLOW__CORE__EXECUTOR
              value: {{ .Values.airflow.executor | quote }}
            {{- if .Values.airflow.existingFernetSecret }}
            - name: AIRFLOW__CORE__FERNET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.airflow.existingFernetSecret }}
                  key: fernet-key
            {{- else if .Values.airflow.fernetKey }}
            - name: AIRFLOW__CORE__FERNET_KEY
              value: {{ .Values.airflow.fernetKey | quote }}
            {{- end }}
          envFrom:
            - configMapRef:
                name: airflow-env
          resources:
            {{- toYaml .Values.airflow.scheduler.resources | nindent 12 }}
          volumeMounts:
            - name: dags
              mountPath: /opt/airflow/dags
      {{- if .Values.airflow.dags.gitSync.enabled }}
        - name: git-sync
          image: {{ .Values.airflow.dags.gitSync.image }}
          env:
            - name: GITSYNC_REPO
              value: {{ .Values.airflow.dags.gitSync.repo | quote }}
            - name: GITSYNC_BRANCH
              value: {{ .Values.airflow.dags.gitSync.branch | quote }}
            - name: GITSYNC_ROOT
              value: "/git"
            - name: GITSYNC_DEST
              value: "dags"
            - name: GITSYNC_PERIOD
              value: {{ .Values.airflow.dags.gitSync.interval | quote }}
            {{- if .Values.airflow.dags.gitSync.existingSSHSecret }}
            - name: GITSYNC_SSH
              value: "true"
            - name: GITSYNC_SSH_KEY_FILE
              value: "/etc/git-secret/ssh-key"
            {{- end }}
          volumeMounts:
            - name: dags
              mountPath: /git
            {{- if .Values.airflow.dags.gitSync.existingSSHSecret }}
            - name: git-ssh
              mountPath: /etc/git-secret
              readOnly: true
            {{- end }}
      {{- end }}
      volumes:
        - name: dags
          emptyDir: {}
        {{- if and .Values.airflow.dags.gitSync.enabled .Values.airflow.dags.gitSync.existingSSHSecret }}
        - name: git-ssh
          secret:
            secretName: {{ .Values.airflow.dags.gitSync.existingSSHSecret }}
            defaultMode: 0400
        {{- end }}
