apiVersion: batch/v1
kind: Job
metadata:
  name: airflow-db-init
  labels:
    app.kubernetes.io/name: airflow
    {{- include "chart.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": hook-succeeded,before-hook-creation
spec:
  backoffLimit: 5
  template:
    metadata:
      labels:
        app.kubernetes.io/name: airflow-db-init
    spec:
      restartPolicy: OnFailure
      serviceAccountName: airflow
      initContainers:
        - name: wait-for-db
          image: {{ .Values.postgresql.image }}
          command:
            - sh
            - -c
            - |
              echo "Waiting for PostgreSQL..."
              until pg_isready -h airflow-db -p 5432 -U {{ .Values.postgresql.username }}; do
                sleep 3
              done
              echo "PostgreSQL ready."
      containers:
        - name: db-init
          image: {{ .Values.airflow.image }}
          command:
            - bash
            - -c
            - |
              set -euo pipefail

              echo "=== Running airflow db migrate ==="
              airflow db migrate

              echo "=== Creating admin user ==="
              airflow users create \
                --role Admin \
                --username {{ .Values.airflow.webserver.adminUser | quote }} \
                --email {{ .Values.airflow.webserver.adminEmail | quote }} \
                --firstname Admin \
                --lastname User \
                --password "${ADMIN_PASSWORD}" \
              || echo "Admin user may already exist"

              echo "=== DB init complete ==="
          env:
            - name: POSTGRES_PASSWORD
              {{- if .Values.postgresql.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgresql.existingSecret }}
                  key: postgres-password
              {{- else }}
              value: {{ .Values.postgresql.password | quote }}
              {{- end }}
            - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
              value: "postgresql+psycopg2://{{ .Values.postgresql.username }}:$(POSTGRES_PASSWORD)@airflow-db:5432/{{ .Values.postgresql.database }}"
            - name: ADMIN_PASSWORD
              {{- if .Values.airflow.webserver.existingAdminSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.airflow.webserver.existingAdminSecret }}
                  key: admin-password
              {{- else }}
              value: {{ .Values.airflow.webserver.adminPassword | quote }}
              {{- end }}
            {{- if .Values.airflow.existingFernetSecret }}
            - name: AIRFLOW__CORE__FERNET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.airflow.existingFernetSecret }}
                  key: fernet-key
            {{- else if .Values.airflow.fernetKey }}
            - name: AIRFLOW__CORE__FERNET_KEY
              value: {{ .Values.airflow.fernetKey | quote }}
            {{- end }}
