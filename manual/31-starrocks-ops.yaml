apiVersion: batch/v1
kind: Job
metadata:
  name: cre-6630-starrocks-init-sql
  namespace: qa-security
  labels:
    app: cre-6630-starrocks
    component: init-sql
spec:
  backoffLimit: 5
  template:
    metadata:
      labels:
        app: cre-6630-starrocks
        component: init-sql
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-starrocks
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z cre-6630-starrocks 9030; do echo "Waiting for StarRocks..."; sleep 5; done
      containers:
        - name: init-sql
          image: mysql:8.0
          command:
            - sh
            - -c
            - |
              mysql -h cre-6630-starrocks -P 9030 -u root <<'SQL'
              CREATE EXTERNAL CATALOG IF NOT EXISTS iceberg_catalog
              PROPERTIES (
                  "type" = "iceberg",
                  "iceberg.catalog.type" = "rest",
                  "iceberg.catalog.uri" = "http://iceberg-rest-catalog:8181",
                  "aws.s3.region" = "us-west-2",
                  "aws.s3.use_instance_profile" = "true"
              );
              SQL
