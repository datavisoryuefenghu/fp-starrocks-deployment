apiVersion: v1
kind: Service
metadata:
  name: iceberg-catalog-mysql
  namespace: qa-security
  labels:
    app: iceberg-catalog-mysql
spec:
  type: ClusterIP
  ports:
    - name: mysql
      port: 3306
      targetPort: mysql
      protocol: TCP
  selector:
    app: iceberg-catalog-mysql
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: iceberg-catalog-mysql
  namespace: qa-security
  labels:
    app: iceberg-catalog-mysql
spec:
  serviceName: iceberg-catalog-mysql
  replicas: 1
  selector:
    matchLabels:
      app: iceberg-catalog-mysql
  template:
    metadata:
      labels:
        app: iceberg-catalog-mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: mysql
              containerPort: 3306
              protocol: TCP
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: iceberg-catalog-mysql
                  key: mysql-root-password
            - name: MYSQL_DATABASE
              value: iceberg_catalog
            - name: MYSQL_USER
              value: iceberg
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: iceberg-catalog-mysql
                  key: mysql-password
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - mysqladmin ping -uroot -p"$MYSQL_ROOT_PASSWORD"
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - mysqladmin ping -uroot -p"$MYSQL_ROOT_PASSWORD"
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 20Gi
