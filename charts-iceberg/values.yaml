# FP MySQL — the shared FP MySQL instance. The iceberg_catalog DB is created by
# the iceberg-catalog-init Job on first install. SMT reads per-tenant feature
# metadata from the same host using per-tenant DB names at runtime.
fpMysql:
  host: ""                        # FP MySQL K8s hostname (e.g. fp-mysql.production)
  port: 3306
  icebergCatalogDb: iceberg_catalog

iceberg:
  restCatalog:
    image: tabulario/iceberg-rest:1.6.0
    replicas: 1
    jdbcSecret:
      name: iceberg-rest-jdbc     # Pre-existing K8s Secret — create before installing this chart.
                                  # Must contain keys: jdbc-user, jdbc-password
    s3:
      bucket: ""                  # S3 bucket name (e.g. datavisor-prod-iceberg)
      region: us-west-2
      warehousePrefix: ""         # Full S3 URI prefix (e.g. s3://datavisor-prod-iceberg/cre-6630/)
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi

kafkaConnect:
  image: confluentinc/cp-kafka-connect:7.7.1
  bootstrapServers: ""            # Kafka brokers (e.g. kafka:9092)
  replicationFactor: 3
  icebergConnectorVersion: "1.9.2"
  connector:
    tasksMax: 2
    commitIntervalMs: 600000      # 10 min; FP Java passes this per-connector at registration time
    smtRefreshIntervalMs: 60000
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 2Gi
