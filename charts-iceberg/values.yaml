# FP MySQL — the shared FP MySQL instance. The iceberg_catalog DB is created by
# the iceberg-catalog-init Job on first install. SMT reads per-tenant feature
# metadata from the same host using per-tenant DB names at runtime.
fpMysql:
  host: ""                        # FP MySQL K8s hostname (e.g. fp-mysql.production)
  port: 3306
  icebergCatalogDb: iceberg_catalog
  user: root                      # MySQL user for iceberg_catalog DB operations
  existingSecret: fp-mysql        # K8s Secret containing MySQL password (must already exist)
  existingSecretKey: mysql-root-password  # Key within the secret

iceberg:
  restCatalog:
    image: tabulario/iceberg-rest:1.6.0
    replicas: 1
    jdbcSecret:
      name: iceberg-rest-jdbc     # Secret with keys: jdbc-user, jdbc-password
      create: true                # Auto-create from fpMysql.existingSecret (set false to manage manually)
    s3:
      bucket: ""                  # S3 bucket name (e.g. datavisor-prod-iceberg)
      region: us-west-2
      warehousePrefix: ""         # Full S3 URI prefix (e.g. s3://datavisor-prod-iceberg/cre-6630/)
    resources:
      requests:
        cpu: 500m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 512Mi

kafkaConnect:
  image: confluentinc/cp-kafka-connect:7.7.1
  bootstrapServers: ""            # Kafka brokers (e.g. kafka:9092)
  replicationFactor: 3
  icebergConnectorVersion: "1.9.2"
  smtJarS3Uri: ""                 # S3 URI of pre-built SMT JAR (e.g. s3://bucket/cre-6630/smt/fp-feature-smt-1.0.0.jar)
                                  # Build: cd feature-platform/smt && mvn package
                                  # Upload: aws s3 cp smt/target/fp-feature-smt-1.0.0.jar <s3-uri>
  resources:
    requests:
      cpu: "4"
      memory: 4Gi
    limits:
      cpu: "4"
      memory: 4Gi
