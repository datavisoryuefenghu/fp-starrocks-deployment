# awsuswest2deva — duckdb namespace on dev_a cluster
# helm upgrade --install fp-iceberg ./charts-iceberg -f charts-iceberg/awsuswest2deva/values.yaml -n duckdb

fpMysql:
  host: fp-mysql.duckdb

iceberg:
  restCatalog:
    s3:
      bucket: datavisor-dev-us-west-2-iceberg
      warehousePrefix: "s3://datavisor-dev-us-west-2-iceberg/cre-6630/duckdb/"

kafkaConnect:
  bootstrapServers: "kafka3.duckdb:9092"
  replicationFactor: 3
  smtJarS3Uri: "s3://datavisor-dev-us-west-2-iceberg/cre-6630/smt/fp-feature-smt-1.0.0.jar"
