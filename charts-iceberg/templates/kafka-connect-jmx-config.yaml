apiVersion: v1
kind: ConfigMap
metadata:
  name: kafka-connect-jmx-config
  labels:
    app.kubernetes.io/name: iceberg-kafka-connect
    {{- include "chart.labels" . | nindent 4 }}
data:
  config.yaml: |
    lowercaseOutputName: true
    lowercaseOutputLabelNames: true
    rules:
      # Consumer fetch metrics — lag, fetch rate
      - pattern: "kafka.consumer<type=consumer-fetch-manager-metrics, client-id=(.+), topic=(.+), partition=(.+)><>records-lag-max"
        name: kafka_connect_consumer_lag_max
        type: GAUGE
        labels:
          client_id: "$1"
          topic: "$2"
          partition: "$3"
      - pattern: "kafka.consumer<type=consumer-fetch-manager-metrics, client-id=(.+)><>records-consumed-rate"
        name: kafka_connect_consumer_records_consumed_rate
        type: GAUGE
        labels:
          client_id: "$1"
      # Connector task metrics
      - pattern: "kafka.connect<type=connector-task-metrics, connector=(.+), task=(.+)><>(.+)"
        name: kafka_connect_connector_task_$3
        type: GAUGE
        labels:
          connector: "$1"
          task: "$2"
      # Sink task metrics — send rate, put batch time
      - pattern: "kafka.connect<type=sink-task-metrics, connector=(.+), task=(.+)><>(.+)"
        name: kafka_connect_sink_task_$3
        type: GAUGE
        labels:
          connector: "$1"
          task: "$2"
      # Worker metrics — task commit rate, connector count
      - pattern: "kafka.connect<type=connect-worker-metrics><>(.+)"
        name: kafka_connect_worker_$1
        type: GAUGE
      # Worker rebalance metrics
      - pattern: "kafka.connect<type=connect-worker-rebalance-metrics><>(.+)"
        name: kafka_connect_worker_rebalance_$1
        type: GAUGE
