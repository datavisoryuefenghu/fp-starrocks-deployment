apiVersion: v1
kind: ServiceAccount
metadata:
  name: iceberg-rest-catalog
  labels:
    app.kubernetes.io/name: iceberg-rest-catalog
    {{- include "chart.labels" . | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: iceberg-rest-catalog
  labels:
    app.kubernetes.io/name: iceberg-rest-catalog
    {{- include "chart.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: rest
      port: 8181
      targetPort: rest
  selector:
    app.kubernetes.io/name: iceberg-rest-catalog
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: iceberg-rest-catalog
  labels:
    app.kubernetes.io/name: iceberg-rest-catalog
    {{- include "chart.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.iceberg.restCatalog.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: iceberg-rest-catalog
  template:
    metadata:
      labels:
        app.kubernetes.io/name: iceberg-rest-catalog
    spec:
      serviceAccountName: iceberg-rest-catalog
      initContainers:
        - name: mysql-jdbc
          image: curlimages/curl:8.7.1
          command:
            - sh
            - -c
            - |
              set -euo pipefail
              curl -fsSL \
                https://repo1.maven.org/maven2/com/mysql/mysql-connector-j/8.0.33/mysql-connector-j-8.0.33.jar \
                -o /work/mysql-connector-j-8.0.33.jar
          volumeMounts:
            - name: mysql-jdbc
              mountPath: /work
      containers:
        - name: iceberg-rest
          image: {{ .Values.iceberg.restCatalog.image }}
          command:
            - java
            - -cp
            - /usr/lib/iceberg-rest/iceberg-rest-image-all.jar:/usr/lib/iceberg-rest/mysql-connector-j-8.0.33.jar
            - org.apache.iceberg.rest.RESTCatalogServer
          ports:
            - name: rest
              containerPort: 8181
          env:
            - name: CATALOG_WAREHOUSE
              value: {{ .Values.iceberg.restCatalog.s3.warehousePrefix | quote }}
            - name: CATALOG_IO__IMPL
              value: "org.apache.iceberg.aws.s3.S3FileIO"
            - name: CATALOG_URI
              value: "jdbc:mysql://{{ .Values.fpMysql.host }}:{{ .Values.fpMysql.port }}/{{ .Values.fpMysql.icebergCatalogDb }}?autoReconnect=true&useSSL=false&connectTimeout=5000&socketTimeout=30000&tcpKeepAlive=true"
            - name: CATALOG_JDBC_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.iceberg.restCatalog.jdbcSecret.name }}
                  key: jdbc-user
            - name: CATALOG_JDBC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.iceberg.restCatalog.jdbcSecret.name }}
                  key: jdbc-password
            - name: CATALOG_JDBC_INITIALIZE__TABLES
              value: "true"
            - name: AWS_REGION
              value: {{ .Values.iceberg.restCatalog.s3.region | quote }}
          readinessProbe:
            httpGet:
              path: /v1/config
              port: rest
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /v1/config
              port: rest
            initialDelaySeconds: 20
            periodSeconds: 30
            failureThreshold: 3
          resources:
            {{- toYaml .Values.iceberg.restCatalog.resources | nindent 12 }}
          volumeMounts:
            - name: mysql-jdbc
              mountPath: /usr/lib/iceberg-rest/mysql-connector-j-8.0.33.jar
              subPath: mysql-connector-j-8.0.33.jar
      volumes:
        - name: mysql-jdbc
          emptyDir: {}
