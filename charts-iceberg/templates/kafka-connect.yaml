apiVersion: v1
kind: ServiceAccount
metadata:
  name: iceberg-kafka-connect
  labels:
    app.kubernetes.io/name: iceberg-kafka-connect
    {{- include "chart.labels" . | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: iceberg-kafka-connect
  labels:
    app.kubernetes.io/name: iceberg-kafka-connect
    {{- include "chart.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: rest
      port: 8083
      targetPort: rest
  selector:
    app.kubernetes.io/name: iceberg-kafka-connect
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: iceberg-kafka-connect
  labels:
    app.kubernetes.io/name: iceberg-kafka-connect
    {{- include "chart.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: iceberg-kafka-connect
  template:
    metadata:
      labels:
        app.kubernetes.io/name: iceberg-kafka-connect
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9404"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: iceberg-kafka-connect
      initContainers:
        - name: download-jmx-exporter
          image: curlimages/curl:8.5.0
          command: ["sh", "-c"]
          args:
            - curl -sL -o /jmx-exporter/jmx_prometheus_javaagent.jar
              https://repo1.maven.org/maven2/io/prometheus/jmx/jmx_prometheus_javaagent/1.0.1/jmx_prometheus_javaagent-1.0.1.jar
          volumeMounts:
            - name: jmx-exporter-jar
              mountPath: /jmx-exporter
        - name: download-smt
          image: amazon/aws-cli:2.17.0
          command:
            - sh
            - -c
            - |
              set -euo pipefail
              mkdir -p /plugins/fp-feature-smt
              aws s3 cp {{ .Values.kafkaConnect.smtJarS3Uri | quote }} /plugins/fp-feature-smt/fp-feature-smt.jar
          env:
            - name: AWS_REGION
              value: {{ .Values.iceberg.restCatalog.s3.region | quote }}
          volumeMounts:
            - name: plugin-dir
              mountPath: /plugins
        - name: install-plugins
          image: {{ .Values.kafkaConnect.image }}
          command:
            - bash
            - -c
            - |
              set -euo pipefail
              confluent-hub install --no-prompt --component-dir /plugins iceberg/iceberg-kafka-connect:{{ .Values.kafkaConnect.icebergConnectorVersion }}
          volumeMounts:
            - name: plugin-dir
              mountPath: /plugins
      containers:
        - name: kafka-connect
          image: {{ .Values.kafkaConnect.image }}
          ports:
            - name: rest
              containerPort: 8083
            - name: jmx-metrics
              containerPort: 9404
          env:
            - name: KAFKA_OPTS
              value: "-javaagent:/jmx-exporter-jar/jmx_prometheus_javaagent.jar=9404:/jmx-exporter-config/config.yaml"
            - name: CONNECT_BOOTSTRAP_SERVERS
              value: {{ .Values.kafkaConnect.bootstrapServers | quote }}
            - name: CONNECT_REST_PORT
              value: "8083"
            - name: CONNECT_GROUP_ID
              value: "iceberg-connect"
            - name: CONNECT_CONFIG_STORAGE_TOPIC
              value: "iceberg-connect-configs"
            - name: CONNECT_OFFSET_STORAGE_TOPIC
              value: "iceberg-connect-offsets"
            - name: CONNECT_STATUS_STORAGE_TOPIC
              value: "iceberg-connect-status"
            - name: CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR
              value: {{ .Values.kafkaConnect.replicationFactor | quote }}
            - name: CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR
              value: {{ .Values.kafkaConnect.replicationFactor | quote }}
            - name: CONNECT_STATUS_STORAGE_REPLICATION_FACTOR
              value: {{ .Values.kafkaConnect.replicationFactor | quote }}
            - name: CONNECT_KEY_CONVERTER
              value: "org.apache.kafka.connect.storage.StringConverter"
            - name: CONNECT_VALUE_CONVERTER
              value: "org.apache.kafka.connect.json.JsonConverter"
            - name: CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE
              value: "false"
            - name: CONNECT_REST_ADVERTISED_HOST_NAME
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: CONNECT_OFFSET_FLUSH_INTERVAL_MS
              value: "10000"
            - name: CONNECT_SESSION_TIMEOUT_MS
              value: "30000"
            - name: CONNECT_HEARTBEAT_INTERVAL_MS
              value: "10000"
            - name: CONNECT_PLUGIN_PATH
              value: "/usr/share/java,/usr/share/confluent-hub-components,/plugins"
            - name: AWS_REGION
              value: {{ .Values.iceberg.restCatalog.s3.region | quote }}
          livenessProbe:
            httpGet:
              path: /connectors
              port: rest
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /connectors
              port: rest
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.kafkaConnect.resources | nindent 12 }}
          volumeMounts:
            - name: plugin-dir
              mountPath: /plugins
              readOnly: true
            - name: jmx-exporter-jar
              mountPath: /jmx-exporter-jar
              readOnly: true
            - name: jmx-exporter-config
              mountPath: /jmx-exporter-config
              readOnly: true
      volumes:
        - name: plugin-dir
          emptyDir: {}
        - name: jmx-exporter-jar
          emptyDir: {}
        - name: jmx-exporter-config
          configMap:
            name: kafka-connect-jmx-config
