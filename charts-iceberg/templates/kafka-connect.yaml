apiVersion: v1
kind: ServiceAccount
metadata:
  name: iceberg-kafka-connect
  labels:
    app.kubernetes.io/name: iceberg-kafka-connect
    {{- include "chart.labels" . | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: iceberg-kafka-connect
  labels:
    app.kubernetes.io/name: iceberg-kafka-connect
    {{- include "chart.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: rest
      port: 8083
      targetPort: rest
  selector:
    app.kubernetes.io/name: iceberg-kafka-connect
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: iceberg-kafka-connect
  labels:
    app.kubernetes.io/name: iceberg-kafka-connect
    {{- include "chart.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: iceberg-kafka-connect
  template:
    metadata:
      labels:
        app.kubernetes.io/name: iceberg-kafka-connect
    spec:
      serviceAccountName: iceberg-kafka-connect
      initContainers:
        - name: build-smt
          image: maven:3.9-eclipse-temurin-17
          command:
            - bash
            - -c
            - |
              set -euo pipefail
              mkdir -p /work/src/main/java/com/datavisor/smt /build-out
              cp /src/pom.xml /work/pom.xml
              cp /src/FeatureResolverTransform.java /work/src/main/java/com/datavisor/smt/FeatureResolverTransform.java
              cd /work
              mvn -q package -DskipTests
              cp /work/target/fp-feature-smt-1.0.0.jar /build-out/fp-feature-smt.jar
          volumeMounts:
            - name: smt-source
              mountPath: /src
              readOnly: true
            - name: smt-build-out
              mountPath: /build-out
        - name: install-plugins
          image: {{ .Values.kafkaConnect.image }}
          command:
            - bash
            - -c
            - |
              set -euo pipefail
              confluent-hub install --no-prompt --component-dir /plugins iceberg/iceberg-kafka-connect:{{ .Values.kafkaConnect.icebergConnectorVersion }}
              mkdir -p /plugins/fp-feature-smt
              cp /build-out/fp-feature-smt.jar /plugins/fp-feature-smt/fp-feature-smt.jar
          volumeMounts:
            - name: plugin-dir
              mountPath: /plugins
            - name: smt-build-out
              mountPath: /build-out
              readOnly: true
      containers:
        - name: kafka-connect
          image: {{ .Values.kafkaConnect.image }}
          ports:
            - name: rest
              containerPort: 8083
          env:
            - name: CONNECT_BOOTSTRAP_SERVERS
              value: {{ .Values.kafkaConnect.bootstrapServers | quote }}
            - name: CONNECT_REST_PORT
              value: "8083"
            - name: CONNECT_GROUP_ID
              value: "iceberg-connect"
            - name: CONNECT_CONFIG_STORAGE_TOPIC
              value: "iceberg-connect-configs"
            - name: CONNECT_OFFSET_STORAGE_TOPIC
              value: "iceberg-connect-offsets"
            - name: CONNECT_STATUS_STORAGE_TOPIC
              value: "iceberg-connect-status"
            - name: CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR
              value: {{ .Values.kafkaConnect.replicationFactor | quote }}
            - name: CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR
              value: {{ .Values.kafkaConnect.replicationFactor | quote }}
            - name: CONNECT_STATUS_STORAGE_REPLICATION_FACTOR
              value: {{ .Values.kafkaConnect.replicationFactor | quote }}
            - name: CONNECT_KEY_CONVERTER
              value: "org.apache.kafka.connect.storage.StringConverter"
            - name: CONNECT_VALUE_CONVERTER
              value: "org.apache.kafka.connect.json.JsonConverter"
            - name: CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE
              value: "false"
            - name: CONNECT_REST_ADVERTISED_HOST_NAME
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: CONNECT_PLUGIN_PATH
              value: "/usr/share/java,/usr/share/confluent-hub-components,/plugins"
            - name: AWS_REGION
              value: {{ .Values.iceberg.restCatalog.s3.region | quote }}
          livenessProbe:
            httpGet:
              path: /connectors
              port: rest
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /connectors
              port: rest
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.kafkaConnect.resources | nindent 12 }}
          volumeMounts:
            - name: plugin-dir
              mountPath: /plugins
              readOnly: true
      volumes:
        - name: plugin-dir
          emptyDir: {}
        - name: smt-build-out
          emptyDir: {}
        - name: smt-source
          configMap:
            name: fp-feature-smt-source
