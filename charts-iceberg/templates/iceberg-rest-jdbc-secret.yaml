{{- if .Values.iceberg.restCatalog.jdbcSecret.create }}
{{- $fpSecret := lookup "v1" "Secret" .Release.Namespace .Values.fpMysql.existingSecret }}
{{- if $fpSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.iceberg.restCatalog.jdbcSecret.name }}
  labels:
    app.kubernetes.io/name: iceberg-rest-jdbc
    {{- include "chart.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/resource-policy": keep
type: Opaque
data:
  jdbc-user: {{ .Values.fpMysql.user | default "root" | b64enc | quote }}
  jdbc-password: {{ index $fpSecret.data .Values.fpMysql.existingSecretKey }}
{{- else if not (lookup "v1" "Secret" .Release.Namespace .Values.iceberg.restCatalog.jdbcSecret.name) }}
{{- fail (printf "Cannot auto-create iceberg-rest-jdbc: source secret '%s' not found in namespace '%s'. Create the fp-mysql secret first." .Values.fpMysql.existingSecret .Release.Namespace) }}
{{- end }}
{{- end }}
