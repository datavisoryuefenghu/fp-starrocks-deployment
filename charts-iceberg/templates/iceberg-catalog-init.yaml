apiVersion: batch/v1
kind: Job
metadata:
  name: iceberg-catalog-init
  labels:
    {{- include "chart.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": hook-succeeded,before-hook-creation
spec:
  template:
    metadata:
      labels:
        app.kubernetes.io/name: iceberg-catalog-init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: init-db
          image: mysql:8.0
          command:
            - bash
            - -c
            - |
              set -euo pipefail
              echo "Creating iceberg_catalog database in FP MySQL if it does not exist..."
              mysql -h {{ .Values.fpMysql.host | quote }} \
                    -P {{ .Values.fpMysql.port }} \
                    -u "${JDBC_USER}" \
                    -p"${JDBC_PASSWORD}" \
                    -e "CREATE DATABASE IF NOT EXISTS {{ .Values.fpMysql.icebergCatalogDb }} CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;"
              echo "Done."
          env:
            - name: JDBC_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.iceberg.restCatalog.jdbcSecret.name }}
                  key: jdbc-user
            - name: JDBC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.iceberg.restCatalog.jdbcSecret.name }}
                  key: jdbc-password
